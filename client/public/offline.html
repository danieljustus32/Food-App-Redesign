<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feastly – You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0ebe7;
      color: #3d2b1f;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #b22222;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #6b4c3b;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: #b22222;
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #8b1a1a; }

    .tip {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #9e7b6b;
    }
  </style>
</head>
<body>
  <div class="icon">🍽️</div>
  <h1>You're offline</h1>
  <p>
    It looks like you've lost your internet connection.
    Your saved recipes and shopping list are still available.
  </p>
  <button onclick="window.location.reload()">Try again</button>
  <p class="tip">Tip: recipes you've already opened are saved for offline reading.</p>
</body>
</html>
